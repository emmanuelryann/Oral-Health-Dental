<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="book.css" rel="stylesheet">
</head>
<body>
    <header>
        <i class="bi bi-chevron-left"></i>
        <div class="details">
            <h1>Oral Health Dental</h1>
            <div>
                <p>2416 Lakeview Terrace, Evergreen Complex, Springfield, IL 62704</p>
                <p class="number">(303) 220-7662</p>
            </div>
        </div>
    </header>
    <div class="booking-container">
        <div class="booking-header">
            <h1>Book an Appointment</h1>
            <p>We are excited to meet you.</p>
        </div>

        <form class="booking-section" method="post">
            <div class="form-group">
                <label for="name">Enter Full Name</label>
                <input id="name">
            </div>

            <div class="form-group">
                <label for="phone">Enter Phone Number</label>
                <input type="text" id="phone">
            </div>

            <div class="form-group">
                <label for="occurence">Have you visited us before?</label>
                <select id="occurence">
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <div class="form-group">
                <label for="service">What would you like to come in for?</label>
                    <select id="service">
                    <option>Cleaning & Exam</option>
                    <option>New Patient Cleaning & Exam - Adult</option>
                    <option>Dental Implant Consult</option>
                    <option>New Patient Emergency/Tooth Pain</option>
                </select>
            </div>

            <div class="form-group">
                <label for="provider">Which provider would you like to see?</label>
                <select id="provider">
                    <option>Dr. Richard (General Dentist)</option>
                    <option>Dr. Carren (General Dentist)</option>
                    <option>Damian RDH (Dental Hygienist)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="date">When would you like to come in?</label>
                <input type="date" id="date">
            </div>

            <div class="form-group">
                <label for="time">What time?</label>
                <select id="time">
                    <option>9:00 AM</option>
                    <option>10:30 AM</option>
                    <option>1:00 PM</option>
                    <option>3:00 PM</option>
                </select>
            </div>

            <button type="submit" class="submit-btn">Confirm Appointment</button>
        </form>
    </div>
    <!-- Success Modal -->
    <div id="successModal" class="modal">
    <div class="modal-content">
        <h2>Appointment Booked</h2>
        <p>Your appointment has been successfully scheduled.</p>
        <button id="modalCloseBtn">OK</button>
    </div>
    </div>

    <!-- Error Modal -->
    <div id="errorModal" class="modal small-modal">
    <div class="modal-content">
        <p id="errorMsg">Please fill all fields.</p>
        <button id="errorCloseBtn">Close</button>
    </div>
    </div>
    <script src="book.js"></script>
</body>
</html>
